<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Motion Planner Visualizer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Define CSS Variables for Colors based on Spec */
        :root {
            --color-obstacle: #60A5FA;
            --color-robot-stroke: #EF4444;
            --color-robot-fill: rgba(239, 68, 68, 0.5);
            --color-goal-stroke: #22C55E;
            --color-goal-fill: rgba(34, 197, 94, 0.5);
            --color-solution: #15803D;
            --color-graph: #9CA3AF;
            --color-reverse-tree: #B45309;
            --color-highlight: #818CF8;
            --color-rejected: #E11D48;
            --color-cost-region: rgba(180, 83, 9, 0.3);
        }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans text-gray-800 overflow-hidden">

    <!-- HEADER -->
    <header class="bg-white border-b border-gray-200 px-4 py-2 flex justify-between items-center shrink-0">
        <h1 class="text-lg font-bold text-gray-700">Motion Planner Visualizer</h1>
    </header>

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex overflow-hidden">
        
        <!-- LEFT CONTROL PANEL -->
        <aside class="w-80 bg-white border-r border-gray-200 flex flex-col overflow-y-auto shrink-0 shadow-sm z-10 transition-all duration-300">
            
            <!-- STANDARD PANELS (Scenario + Algorithm) -->
            <div id="panel-standard">
                <!-- SECTION: SCENARIO (Blue Theme) -->
                <div class="p-4 border-b border-gray-100 border-l-4 border-l-blue-400">
                    <h2 class="text-xs font-semibold text-blue-500 uppercase tracking-wider mb-3">Scenario</h2>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Environment</label>
                            <select id="select-scenario" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-md focus:ring-blue-500 focus:border-blue-500 block p-2">
                                <option value="center_obstacle">Center Obstacle</option>
                                <option value="empty">Empty</option>
                                <option value="narrow_corridor">Narrow Corridor</option>
                                <option value="simple_maze">Simple Maze</option>
                                <option value="complex_maze">Complex Maze</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Robot Type</label>
                            <select id="select-robot" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-md focus:ring-blue-500 focus:border-blue-500 block p-2">
                                <option value="holonomic">2D Holonomic</option>
                                <option value="dubins">Dubins Car</option>
                                <option value="reeds_shepp">Reeds-Shepp Car</option>
                                <!-- Future: Differential -->
                            </select>
                        </div>
                    </div>
                </div>

                <!-- SECTION: ALGORITHM (Red Theme) -->
                <div class="p-4 border-b border-gray-100 border-l-4 border-l-red-500">
                    <h2 class="text-xs font-semibold text-red-600 uppercase tracking-wider mb-3">Algorithm</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Planner</label>
                            <select id="select-planner" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-md focus:ring-red-500 focus:border-red-500 block p-2">
                                <option value="rrt">RRT</option>
                                <option value="rrt_star">RRT*</option>
                                <option value="rrt_connect">RRT-Connect</option>
                                <option value="prm">PRM</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Sampler</label>
                            <select id="select-sampler" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-md focus:ring-red-500 focus:border-red-500 block p-2">
                                <option value="UNIFORM">Uniform Random</option>
                                <option value="HALTON">Halton Sequence</option>
                                <option value="GRID">Grid (Jittered)</option>
                            </select>
                        </div>
                        
                        <!-- Common: Step Size -->
                        <div id="ctrl-step-size">
                            <div class="flex justify-between">
                                <label class="block text-sm text-gray-600">Step Size</label>
                                <span id="val-step-size" class="text-xs text-gray-400">0.5m</span>
                            </div>
                            <input id="input-step-size" type="range" class="slider-algorithm" min="0.1" max="2.0" step="0.1" value="0.5">
                        </div>

                        <!-- Common: Goal Bias -->
                        <div id="ctrl-goal-bias">
                            <div class="flex justify-between">
                                <label class="block text-sm text-gray-600">Goal Bias</label>
                                <span id="val-goal-bias" class="text-xs text-gray-400">5%</span>
                            </div>
                            <input id="input-goal-bias" type="range" class="slider-algorithm" min="0" max="1.0" step="0.05" value="0.05">
                        </div>

                        <!-- RRT*: Rewire Radius -->
                        <div id="ctrl-rewire-radius" class="hidden">
                            <div class="flex justify-between">
                                <label class="block text-sm text-gray-600">Rewire Radius</label>
                                <span id="val-rewire-radius" class="text-xs text-gray-400">2.0m</span>
                            </div>
                            <input id="input-rewire-radius" type="range" class="slider-algorithm" min="0.5" max="5.0" step="0.1" value="2.0">
                        </div>

                        <!-- RRT*: Informed Sampling -->
                        <div id="ctrl-informed" class="hidden flex items-center">
                            <input id="chk-informed" type="checkbox" class="w-4 h-4 checkbox-view border-gray-300 rounded focus:ring-red-500">
                            <label for="chk-informed" class="ml-2 text-sm font-medium text-gray-600">Informed Sampling</label>
                        </div>

                        <!-- RRT-Connect: Greedy -->
                        <div id="ctrl-greedy" class="hidden flex items-center">
                            <input id="chk-greedy" type="checkbox" checked class="w-4 h-4 checkbox-view border-gray-300 rounded focus:ring-red-500">
                            <label for="chk-greedy" class="ml-2 text-sm font-medium text-gray-600">Greedy Extension</label>
                        </div>

                        <!-- PRM: Connection Radius -->
                        <div id="ctrl-prm-radius" class="hidden">
                            <div class="flex justify-between">
                                <label class="block text-sm text-gray-600">Connection Radius</label>
                                <span id="val-prm-radius" class="text-xs text-gray-400">2.0m</span>
                            </div>
                            <input id="input-prm-radius" type="range" class="slider-algorithm" min="0.5" max="5.0" step="0.1" value="2.0">
                        </div>

                        <!-- PRM: Max Neighbors -->
                        <div id="ctrl-prm-k" class="hidden">
                            <div class="flex justify-between">
                                <label class="block text-sm text-gray-600">Max Neighbors (k)</label>
                                <span id="val-prm-k" class="text-xs text-gray-400">10</span>
                            </div>
                            <input id="input-prm-k" type="range" class="slider-algorithm" min="1" max="20" step="1" value="10">
                        </div>

                    </div>
                </div>
            </div>

            <!-- CONTEXT SENSITIVE PANEL (Purple Theme) - Hidden by default -->
            <div id="panel-context" class="hidden h-full flex flex-col">
                <div class="p-4 border-b border-gray-100 border-l-4 border-l-purple-500 bg-purple-50 flex-1">
                    <div class="flex justify-between items-center mb-4">
                        <h2 id="ctx-header" class="text-xs font-semibold text-purple-600 uppercase tracking-wider">Properties</h2>
                        <button id="btn-close-context" class="text-gray-400 hover:text-gray-600 hover:bg-gray-200 rounded p-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                    
                    <div id="ctx-content" class="space-y-4">
                        <!-- Dynamic Content Injected Here -->
                    </div>

                    <button id="btn-delete-object" class="w-full mt-6 bg-white hover:bg-red-50 text-red-600 text-xs font-bold py-2 px-4 rounded border border-red-200 shadow-sm flex items-center justify-center gap-2 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                        Delete Object
                    </button>
                </div>
            </div>

            <!-- SHARED SECTIONS (Always Visible) -->
            <!-- SECTION: VIEW OPTIONS (Brown Theme) -->
            <div class="p-4 border-b border-gray-100 border-l-4 border-l-amber-700">
                <h2 class="text-xs font-semibold text-amber-800 uppercase tracking-wider mb-3">View Options</h2>
                <div class="space-y-2">
                    <div class="flex items-center">
                        <input id="chk-show-rejected" type="checkbox" class="w-4 h-4 checkbox-view border-gray-300 rounded focus:ring-amber-700">
                        <label for="chk-show-rejected" class="ml-2 text-sm font-medium text-gray-700">Show Rejected Samples</label>
                    </div>
                    <div class="flex items-center">
                        <input id="chk-show-grid" type="checkbox" checked class="w-4 h-4 checkbox-view border-gray-300 rounded focus:ring-amber-700">
                        <label for="chk-show-grid" class="ml-2 text-sm font-medium text-gray-700">Show Grid</label>
                    </div>
                </div>
            </div>

            <!-- SECTION: EXECUTION (Green Theme) -->
            <div class="p-4 mt-auto bg-gray-50 border-t border-gray-200 border-l-4 border-l-green-500">
                <h2 class="text-xs font-semibold text-green-600 uppercase tracking-wider mb-3">Execution</h2>
                
                <div class="mb-4">
                    <div class="flex justify-between mb-1">
                        <label class="text-xs text-gray-500">Speed</label>
                        <span id="val-speed" class="text-xs text-gray-400">60 SPS</span>
                    </div>
                    <input id="input-speed" type="range" class="slider-execution" min="1" max="1000" step="10" value="60">
                </div>

                <div class="grid grid-cols-3 gap-2 mb-3">
                    <button id="btn-step-1" class="bg-white hover:bg-gray-100 text-gray-700 text-xs font-semibold py-1 px-2 border border-gray-300 rounded shadow-sm">+1</button>
                    <button id="btn-step-10" class="bg-white hover:bg-gray-100 text-gray-700 text-xs font-semibold py-1 px-2 border border-gray-300 rounded shadow-sm">+10</button>
                    <button id="btn-step-100" class="bg-white hover:bg-gray-100 text-gray-700 text-xs font-semibold py-1 px-2 border border-gray-300 rounded shadow-sm">+100</button>
                </div>

                <button id="btn-run" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded shadow flex items-center justify-center gap-2 transition-colors duration-200">
                    <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-1.832a1 1 0 000-1.664l-3-1.832z" clip-rule="evenodd" />
                    </svg>
                    <svg id="icon-pause" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 hidden" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                    </svg>
                    <span id="text-run">Run until solved</span>
                </button>
            </div>
        </aside>

        <!-- RIGHT WORKSPACE AREA -->
        <main class="flex-1 flex flex-col bg-gray-200 relative">
            
            <!-- TOOLBAR -->
            <div class="h-12 bg-white border-b border-gray-200 flex items-center justify-between px-3 shadow-sm shrink-0">
                <!-- Left Tools -->
                <div class="flex items-center space-x-1" id="toolbar-tools">
                    <!-- Selector -->
                    <button data-tool="select" class="tool-btn p-1.5 rounded hover:bg-gray-100 bg-gray-100 text-blue-600" title="Select">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122" />
                        </svg>
                    </button>
                    
                    <div class="h-6 w-px bg-gray-300 mx-2"></div>

                    <!-- Obstacle Tools (Blue icons) -->
                    <button data-tool="obs-rect" class="tool-btn p-1.5 rounded hover:bg-gray-100 text-gray-600" title="Rect Obstacle">
                        <div class="w-4 h-4 border-2 border-blue-500 rounded-sm pointer-events-none"></div>
                    </button>
                    <button data-tool="obs-circle" class="tool-btn p-1.5 rounded hover:bg-gray-100 text-gray-600" title="Circle Obstacle">
                        <div class="w-4 h-4 border-2 border-blue-500 rounded-full pointer-events-none"></div>
                    </button>
                    <button data-tool="obs-poly" class="tool-btn p-1.5 rounded hover:bg-gray-100 text-gray-600" title="Poly Obstacle">
                        <svg class="w-4 h-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                             <path stroke-linecap="round" stroke-linejoin="round" d="M16 8l2 8-5 3-7-4 3-8z" />
                        </svg>
                    </button>

                    <div class="h-6 w-px bg-gray-300 mx-2"></div>

                    <!-- Cost Region Tools (Brown icons) -->
                    <button data-tool="cost-rect" class="tool-btn p-1.5 rounded hover:bg-gray-100 text-gray-600" title="Cost Rect">
                        <div class="w-4 h-4 border-2 border-amber-700 bg-amber-700/20 rounded-sm pointer-events-none"></div>
                    </button>
                    <button data-tool="cost-circle" class="tool-btn p-1.5 rounded hover:bg-gray-100 text-gray-600" title="Cost Circle">
                        <div class="w-4 h-4 border-2 border-amber-700 bg-amber-700/20 rounded-full pointer-events-none"></div>
                    </button>
                    <button data-tool="cost-poly" class="tool-btn p-1.5 rounded hover:bg-gray-100 text-gray-600" title="Cost Poly">
                        <svg class="w-4 h-4 text-amber-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                             <path stroke-linecap="round" stroke-linejoin="round" d="M16 8l2 8-5 3-7-4 3-8z" />
                        </svg>
                    </button>

                    <div class="h-6 w-px bg-gray-300 mx-2"></div>

                    <!-- Goal Tools (Green icons) -->
                    <button data-tool="goal-rect" class="tool-btn p-1.5 rounded hover:bg-gray-100 text-gray-600" title="Rect Goal">
                        <div class="w-4 h-4 border-2 border-green-500 border-dashed rounded-sm pointer-events-none"></div>
                    </button>
                    <button data-tool="goal-circle" class="tool-btn p-1.5 rounded hover:bg-gray-100 text-gray-600" title="Circle Goal">
                        <div class="w-4 h-4 border-2 border-green-500 border-dashed rounded-full pointer-events-none"></div>
                    </button>
                    <button data-tool="goal-poly" class="tool-btn p-1.5 rounded hover:bg-gray-100 text-gray-600" title="Poly Goal">
                        <svg class="w-4 h-4 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                             <path stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2 2" d="M16 8l2 8-5 3-7-4 3-8z" />
                        </svg>
                    </button>
                </div>

                <!-- Right Tools -->
                <div>
                    <button id="btn-clear-graph" class="text-xs text-red-600 hover:text-red-800 font-semibold px-3 py-1 rounded border border-red-200 hover:bg-red-50 transition-colors flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                        Clear Graph
                    </button>
                </div>
            </div>

            <!-- CANVAS AREA -->
            <div class="flex-1 flex items-center justify-center p-8 overflow-hidden">
                <div class="aspect-square h-full max-h-full bg-white shadow-lg border border-gray-300 relative" id="workspace-container">
                    <svg id="workspace-svg" width="100%" height="100%" viewBox="0 0 1000 1000" class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
                                <path d="M0,0 L0,6 L8,3 z" fill="#EF4444" />
                            </marker>
                            <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
                                <path d="M0,0 L0,6 L8,3 z" fill="#22C55E" />
                            </marker>
                        </defs>
                        <!-- Layers (Order matters) -->
                        <pattern id="grid-pattern" width="100" height="100" patternUnits="userSpaceOnUse">
                            <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#F3F4F6" stroke-width="2"/>
                        </pattern>
                        <rect id="bg-grid" width="100%" height="100%" fill="url(#grid-pattern)" class="cursor-pointer" />
                        
                        <g id="layer-cost-regions"></g>
                        <g id="layer-ellipse"></g>
                        <g id="layer-goals"></g>
                        <g id="layer-graph"></g> <!-- Edges -->
                        <g id="layer-graph-nodes"></g> <!-- Nodes on top of edges -->
                        <g id="layer-obstacles"></g>
                        <g id="layer-rejected"></g>
                        <g id="layer-solution"></g>
                        <g id="layer-robot"></g>
                    </svg>
                </div>
            </div>
            
            <!-- INFO BAR -->
            <div class="h-8 bg-white border-t border-gray-200 flex items-center px-4 text-xs text-gray-600 justify-between shrink-0">
                <div class="flex space-x-6">
                    <div id="info-nodes">Nodes: <span class="font-bold text-gray-900">0</span></div>
                    <div id="info-edges">Edges: <span class="font-bold text-gray-900">0</span></div>
                </div>
                <div>
                    Path: <span id="info-path" class="font-bold text-[#15803D]">N/A</span>
                </div>
            </div>

        </main>
    </div>

    <!-- Main Module -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
