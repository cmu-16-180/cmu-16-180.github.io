<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute Encoder Simulator</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Load Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Inline Icon Components
        const PlayIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const PauseIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>;
        const RotateCcwIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>;
        const RotateCwIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>;
        const SettingsIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>;

        function App() {
            // Physical parameters: 4-bit absolute encoder
            const numBits = 4;
            const numSectors = Math.pow(2, numBits); // 16 sectors
            const degPerSector = 360 / numSectors; // 22.5 degrees
            
            // State
            const [angle, setAngle] = useState(0); 
            const [isSpinning, setIsSpinning] = useState(false);
            const [speedMultiplier, setSpeedMultiplier] = useState(1);
            const [direction, setDirection] = useState(1); 
            const [isDragging, setIsDragging] = useState(false);
            const [encoding, setEncoding] = useState('gray'); // 'binary' or 'gray'
            
            // Refs
            const requestRef = useRef();
            const historyRef = useRef([]); 
            const exactAngleRef = useRef(0);
            const canvasRef = useRef(null);
            const svgRef = useRef(null);
            const dragState = useRef({ lastMouseAngle: 0 });

            // Logic calculations
            const getSignals = (currentAngle, encType) => {
                // Normalize angle to positive 0-359.99
                const normalizedAngle = ((currentAngle % 360) + 360) % 360;
                const sector = Math.floor(normalizedAngle / degPerSector);
                
                // Calculate physical disc reading based on encoding type
                const val = encType === 'gray' ? (sector ^ (sector >> 1)) : sector;
                
                // Extract individual bits
                const B3 = (val >> 3) & 1; // MSB
                const B2 = (val >> 2) & 1;
                const B1 = (val >> 1) & 1;
                const B0 = val & 1;        // LSB

                return { B3, B2, B1, B0, val, sector };
            };

            const getAngleFromEvent = (e) => {
                if (!svgRef.current) return 0;
                const rect = svgRef.current.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return Math.atan2(clientY - cy, clientX - cx) * (180 / Math.PI);
            };

            const handlePointerDown = (e) => {
                setIsDragging(true);
                setIsSpinning(false);
                dragState.current.lastMouseAngle = getAngleFromEvent(e);
            };

            useEffect(() => {
                const handlePointerMove = (e) => {
                    if (!isDragging) return;
                    const currentMouseAngle = getAngleFromEvent(e);
                    let delta = currentMouseAngle - dragState.current.lastMouseAngle;
                    
                    if (delta > 180) delta -= 360;
                    if (delta < -180) delta += 360;

                    exactAngleRef.current += delta;
                    setAngle(exactAngleRef.current);
                    dragState.current.lastMouseAngle = currentMouseAngle;
                };

                const handlePointerUp = () => setIsDragging(false);

                if (isDragging) {
                    window.addEventListener('pointermove', handlePointerMove);
                    window.addEventListener('pointerup', handlePointerUp);
                    window.addEventListener('touchmove', handlePointerMove, { passive: false });
                    window.addEventListener('touchend', handlePointerUp);
                }

                return () => {
                    window.removeEventListener('pointermove', handlePointerMove);
                    window.removeEventListener('pointerup', handlePointerUp);
                    window.removeEventListener('touchmove', handlePointerMove);
                    window.removeEventListener('touchend', handlePointerUp);
                };
            }, [isDragging]);

            const updateLoop = () => {
                if (isSpinning && !isDragging) {
                    const actualSpeed = speedMultiplier * 0.25; 
                    exactAngleRef.current += (actualSpeed * direction);
                    setAngle(exactAngleRef.current);
                }

                const signals = getSignals(exactAngleRef.current, encoding);

                historyRef.current.push(signals);
                if (historyRef.current.length > 400) {
                    historyRef.current.shift(); 
                }

                drawScope();
                requestRef.current = requestAnimationFrame(updateLoop);
            };

            useEffect(() => {
                requestRef.current = requestAnimationFrame(updateLoop);
                return () => cancelAnimationFrame(requestRef.current);
            }, [isSpinning, speedMultiplier, direction, isDragging, encoding]); 

            const handleEncodingChange = (newEncoding) => {
                setEncoding(newEncoding);
                historyRef.current = []; // Clear scope to prevent visual glitch artifacts on swap
            };

            const drawScope = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height; // 300

                ctx.fillStyle = '#1e293b'; 
                ctx.fillRect(0, 0, width, height);

                // Draw Grid
                ctx.strokeStyle = '#334155'; 
                ctx.lineWidth = 1;
                for (let i = 0; i < width; i += 40) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke();
                }
                for (let i = 0; i < height; i += 35) {
                    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(width, i); ctx.stroke();
                }

                const history = historyRef.current;
                if (history.length === 0) return;

                const startX = width - history.length;
                
                // Draw Vertical Transition Lines FIRST
                // We offset them slightly so if multiple bits change simultaneously (Binary mode), they all show up as a thick artifact
                for (let i = 1; i < history.length; i++) {
                    const x = startX + i;
                    if (history[i].B3 !== history[i-1].B3) {
                        ctx.strokeStyle = '#ef4444'; ctx.globalAlpha = 0.5; ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.moveTo(x - 1, 0); ctx.lineTo(x - 1, height); ctx.stroke();
                    }
                    if (history[i].B2 !== history[i-1].B2) {
                        ctx.strokeStyle = '#22c55e'; ctx.globalAlpha = 0.5; ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.moveTo(x - 0.3, 0); ctx.lineTo(x - 0.3, height); ctx.stroke();
                    }
                    if (history[i].B1 !== history[i-1].B1) {
                        ctx.strokeStyle = '#3b82f6'; ctx.globalAlpha = 0.5; ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.moveTo(x + 0.3, 0); ctx.lineTo(x + 0.3, height); ctx.stroke();
                    }
                    if (history[i].B0 !== history[i-1].B0) {
                        ctx.strokeStyle = '#eab308'; ctx.globalAlpha = 0.5; ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.moveTo(x + 1, 0); ctx.lineTo(x + 1, height); ctx.stroke();
                    }
                }
                ctx.globalAlpha = 1.0;

                const drawSignal = (trackName, color, yOffset, amplitude) => {
                    ctx.strokeStyle = color;
                    ctx.globalAlpha = 0.3;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(0, yOffset); ctx.lineTo(width, yOffset); 
                    ctx.moveTo(0, yOffset - amplitude); ctx.lineTo(width, yOffset - amplitude); 
                    ctx.stroke();
                    
                    ctx.globalAlpha = 1.0;
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    
                    for (let i = 0; i < history.length; i++) {
                        const val = history[i][trackName];
                        const x = startX + i;
                        const y = yOffset - (val * amplitude);
                        
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.stroke();

                    ctx.fillStyle = color;
                    ctx.font = '16px monospace';
                    ctx.fillText(trackName, 10, yOffset - amplitude + 15);
                    
                    ctx.font = '10px monospace';
                    ctx.globalAlpha = 0.6;
                    ctx.fillText('1', 10, yOffset - amplitude - 4);
                    ctx.fillText('0', 10, yOffset + 12);
                    ctx.globalAlpha = 1.0;
                };

                // Space the 4 channels evenly
                drawSignal('B3', '#ef4444', 65, 30);   
                drawSignal('B2', '#22c55e', 135, 30);  
                drawSignal('B1', '#3b82f6', 205, 30);  
                drawSignal('B0', '#eab308', 275, 30);  
            };

            // Helper to draw clean SVG arcs for the disc sectors
            const getArcPath = (cx, cy, r, startAngle, endAngle) => {
                const startRad = (startAngle * Math.PI) / 180;
                const endRad = (endAngle * Math.PI) / 180;
                const x1 = cx + r * Math.cos(startRad);
                const y1 = cy + r * Math.sin(startRad);
                const x2 = cx + r * Math.cos(endRad);
                const y2 = cy + r * Math.sin(endRad);
                const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
                return `M ${x1} ${y1} A ${r} ${r} 0 ${largeArcFlag} 1 ${x2} ${y2}`;
            };

            const curSignals = getSignals(angle, encoding);

            return (
                <div className="min-h-screen text-slate-200 p-6 font-sans flex flex-col items-center">
                    <div className="max-w-6xl w-full">
                        <div className="mb-8 border-b border-slate-700 pb-4">
                            <h1 className="text-3xl font-bold text-white mb-2">Absolute Optical Encoder</h1>
                            <p className="text-slate-400">Interactive tool demonstrating absolute positioning, parallel track readout, and the advantages of Gray code over standard Binary to prevent read glitches.</p>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <div className="bg-slate-800 rounded-xl p-6 shadow-xl border border-slate-700 flex flex-col">
                                <h2 className="text-xl font-semibold text-white mb-4 flex items-center justify-between">
                                    <span className="flex items-center"><SettingsIcon /> Mechanical Disc View</span>
                                </h2>
                                
                                <div 
                                    className={`relative flex justify-center items-center h-[400px] bg-slate-900 rounded-lg overflow-hidden border border-slate-700 ${isDragging ? 'cursor-grabbing' : 'cursor-grab'}`}
                                    onPointerDown={handlePointerDown}
                                    style={{ touchAction: 'none' }}
                                >
                                    {isDragging && (
                                        <div className="absolute top-4 bg-indigo-600 text-white text-xs px-3 py-1 rounded-full z-10 shadow-lg pointer-events-none">
                                            Dragging Disc...
                                        </div>
                                    )}
                                    
                                    <svg width="400" height="400" className="absolute" ref={svgRef}>
                                        <circle cx="200" cy="200" r="140" fill="#0f172a" stroke="#334155" strokeWidth="2" />
                                        
                                        {/* Disc Group */}
                                        <g transform={`rotate(${angle} 200 200)`}>
                                            {[3, 2, 1, 0].map(bit => {
                                                // B3 (MSB) innermost, B0 (LSB) outermost
                                                const r = 50 + (3 - bit) * 20; 
                                                return (
                                                    <g key={`track-${bit}`}>
                                                        {/* Dark Background for the track (Blocked Light) */}
                                                        <circle cx="200" cy="200" r={r} stroke="#1e293b" strokeWidth="20" fill="none" />
                                                        
                                                        {/* Slits (Light Passes Through) */}
                                                        {Array.from({length: 16}).map((_, s) => {
                                                            const secVal = encoding === 'gray' ? s ^ (s >> 1) : s;
                                                            const isLight = (secVal >> bit) & 1;
                                                            if (!isLight) return null;
                                                            
                                                            // We draw sectors "backwards" so that a Clockwise physical rotation
                                                            // results in an INCREASING sector value read by the sensor at 0 degrees.
                                                            const startAngle = 360 - (s + 1) * 22.5;
                                                            const endAngle = 360 - s * 22.5;
                                                            
                                                            // +0.5 to end angle overlaps gaps created by sub-pixel rendering
                                                            return <path key={`arc-${s}`} d={getArcPath(200, 200, r, startAngle, endAngle + 0.5)} stroke="#e2e8f0" strokeWidth="20" fill="none" />
                                                        })}
                                                    </g>
                                                )
                                            })}
                                            
                                            <circle cx="200" cy="200" r="20" fill="#334155" />
                                            <circle cx="200" cy="200" r="8" fill="#0f172a" />
                                        </g>

                                        {/* Radial Sensor Overlay at 3 o'clock (Right side) */}
                                        <g transform="translate(200, 200)">
                                            {/* Sensor Body */}
                                            <rect x="30" y="-20" width="100" height="40" fill="rgba(255, 255, 255, 0.05)" stroke="#334155" strokeWidth="2" rx="4" />
                                            
                                            <circle cx="50" cy="0" r="4" fill={curSignals.B3 ? '#ef4444' : '#7f1d1d'} stroke="#000" />
                                            <circle cx="70" cy="0" r="4" fill={curSignals.B2 ? '#22c55e' : '#14532d'} stroke="#000" />
                                            <circle cx="90" cy="0" r="4" fill={curSignals.B1 ? '#3b82f6' : '#1e3a8a'} stroke="#000" />
                                            <circle cx="110" cy="0" r="4" fill={curSignals.B0 ? '#eab308' : '#713f12'} stroke="#000" />
                                            
                                            <text x="50" y="14" fill="#ef4444" fontSize="10" fontFamily="monospace" textAnchor="middle">B3</text>
                                            <text x="70" y="14" fill="#22c55e" fontSize="10" fontFamily="monospace" textAnchor="middle">B2</text>
                                            <text x="90" y="14" fill="#3b82f6" fontSize="10" fontFamily="monospace" textAnchor="middle">B1</text>
                                            <text x="110" y="14" fill="#eab308" fontSize="10" fontFamily="monospace" textAnchor="middle">B0</text>
                                        </g>
                                    </svg>
                                </div>

                                <div className="mt-6 space-y-4">
                                    <div className="bg-slate-900 p-1 rounded-lg border border-slate-700 flex">
                                        <button 
                                            className={`flex-1 py-2 text-sm font-bold rounded transition-colors ${encoding === 'binary' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}
                                            onClick={() => handleEncodingChange('binary')}
                                        >
                                            Standard Binary
                                        </button>
                                        <button 
                                            className={`flex-1 py-2 text-sm font-bold rounded transition-colors ${encoding === 'gray' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}
                                            onClick={() => handleEncodingChange('gray')}
                                        >
                                            Gray Code
                                        </button>
                                    </div>

                                    <div className="flex items-center justify-between bg-slate-900 p-4 rounded-lg">
                                        <span className="text-slate-400 font-medium">Motor Control</span>
                                        <div className="flex gap-2">
                                            <button onClick={() => setDirection(-1)} className={`p-2 rounded ${direction === -1 ? 'bg-indigo-600' : 'bg-slate-700'}`}><RotateCcwIcon /></button>
                                            <button onClick={() => setIsSpinning(!isSpinning)} className={`px-6 py-2 rounded font-bold flex items-center ${isSpinning ? 'bg-rose-600' : 'bg-emerald-600'}`}>
                                                {isSpinning ? <><PauseIcon/> Stop</> : <><PlayIcon/> Spin</>}
                                            </button>
                                            <button onClick={() => setDirection(1)} className={`p-2 rounded ${direction === 1 ? 'bg-indigo-600' : 'bg-slate-700'}`}><RotateCwIcon /></button>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="flex justify-between text-sm text-slate-400 mb-2">
                                            <span>Fine Manual Rotation</span>
                                            <span>{(((-angle % 360) + 360) % 360).toFixed(1)}°</span>
                                        </label>
                                        <input type="range" min="-360" max="360" step="0.1" value={isSpinning ? angle % 360 : angle} onChange={(e) => { setIsSpinning(false); setAngle(parseFloat(e.target.value)); exactAngleRef.current = parseFloat(e.target.value); }} className="w-full accent-indigo-500 cursor-ew-resize" />
                                    </div>
                                </div>
                            </div>

                            <div className="flex flex-col gap-8">
                                <div className="bg-slate-800 rounded-xl p-6 shadow-xl border border-slate-700">
                                    <h2 className="text-xl font-semibold text-white mb-4">Parallel Logic Analyzer</h2>
                                    <div className="bg-slate-900 rounded-lg p-2 border border-slate-700 overflow-hidden">
                                        <canvas ref={canvasRef} width="400" height="300" className="w-full h-[300px] rounded" />
                                    </div>
                                </div>

                                <div className="bg-slate-800 rounded-xl p-6 shadow-xl border border-slate-700 flex-1">
                                    <h2 className="text-xl font-semibold text-white mb-4">Controller Data Register</h2>
                                    
                                    <div className="grid grid-cols-2 gap-4 mb-6">
                                        <div className="bg-slate-900 p-4 rounded-lg border border-slate-700 flex flex-col justify-center items-center">
                                            <div className="text-slate-400 text-sm mb-2">Raw Sensor Output</div>
                                            <div className="flex gap-2 font-mono text-3xl font-bold">
                                                <span className={curSignals.B3 ? 'text-red-400' : 'text-slate-600'}>{curSignals.B3}</span>
                                                <span className={curSignals.B2 ? 'text-green-400' : 'text-slate-600'}>{curSignals.B2}</span>
                                                <span className={curSignals.B1 ? 'text-blue-400' : 'text-slate-600'}>{curSignals.B1}</span>
                                                <span className={curSignals.B0 ? 'text-yellow-400' : 'text-slate-600'}>{curSignals.B0}</span>
                                            </div>
                                        </div>
                                        <div className="bg-slate-900 p-4 rounded-lg border border-slate-700 text-center">
                                            <div className="text-slate-400 text-sm mb-1">Decoded Sector</div>
                                            <div className="text-3xl font-mono text-white font-bold tracking-tight">
                                                {curSignals.sector} <span className="text-lg text-slate-500 font-sans">/ 15</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-indigo-950/30 border border-indigo-500/30 rounded-lg p-4 text-sm text-indigo-200">
                                        <h3 className="font-bold text-indigo-300 mb-2">Teaching Moment: Why use Gray Code?</h3>
                                        <ul className="list-disc pl-5 space-y-2">
                                            <li><strong>Standard Binary:</strong> Try dragging the disc slowly across a boundary (e.g., Sector 7 to 8). In standard binary, multiple bits change at once (0111 → 1000). If the physical sensors aren't aligned to microscopic perfection, the computer will briefly read a massive "glitch" value like 1111!</li>
                                            <li><strong>Gray Code:</strong> Switch the encoding and try again. Notice the disc pattern changes so that <strong>only ONE bit ever changes state at a time.</strong> This mathematical trick makes it physically impossible to get a wildly incorrect reading, no matter how bad the sensor alignment is!</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
